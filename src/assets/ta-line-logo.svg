<svg width="420" height="120" viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="gradMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C6FF"/>
      <stop offset="50%" stop-color="#7B2FF7"/>
      <stop offset="100%" stop-color="#FF7A18"/>
    </linearGradient>
  </defs>

  <!-- Icon Circle -->
  <circle cx="60" cy="60" r="45" fill="url(#gradMain)" />

  <!-- Rising Line -->
  <polyline points="30,75 55,55 75,65 95,40"
            fill="none"
            stroke="white"
            stroke-width="5"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Arrow -->
  <polygon points="95,40 90,45 100,45"
           fill="white"/>

  <!-- Text -->
  <text x="130" y="75"
        font-family="Poppins, Arial, sans-serif"
        font-size="48"
        font-weight="bold"
        fill="url(#gradMain)">
    Ta-line
  </text>

</svg>
